services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: uut_prf_app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    depends_on:
      - postgres
      - redis
    networks:
      - uut_prf_network

  nginx:
    image: nginx:latest
    container_name: uut_prf_nginx
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - uut_prf_network

  postgres:
    image: postgres:16
    container_name: uut_prf_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: uut_prf_dev
      POSTGRES_USER: uut_user
      POSTGRES_PASSWORD: uut_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - uut_prf_network

  redis:
    image: redis:7
    container_name: uut_prf_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - uut_prf_network

  minio:
    image: minio/minio:latest
    container_name: uut_prf_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - uut_prf_network

  queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: uut_prf_queue
    working_dir: /var/www
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - uut_prf_network

  horizon:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: uut_prf_horizon
    working_dir: /var/www
    command: php artisan horizon
    volumes:
      - ./:/var/www
    depends_on:
      - app
      - redis
      - postgres
    networks:
      - uut_prf_network

networks:
  uut_prf_network:

volumes:
  postgres_data:
  minio_data: